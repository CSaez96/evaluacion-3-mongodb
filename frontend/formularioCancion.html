<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="./scripts/formularioCancion.js"></script>

    <title>Formulario Registro de Canción</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a href="./inicio.html" class="nav-link">Inicio</a></li>
                <li class="nav-item"><a href="./formulario.html" class="nav-link">Formulario de Registro</a></li>
                <li class="nav-item"><a href="./canciones.html" class="nav-link">Canciones</a></li>
                <li class="nav-item"><a href="./formularioCancion.html" class="nav-link">Registrar Canción</a></li>
            </ul>
        </div>
    </nav>

    <div class="container principal">
        <form id="registroCancion">
            <p class="h3">Registrar Canción Favorita</p>
            <br>
            <div class="container">
                <p class="h5">Usuario Dueño de la Canción</p>
                <hr>
                <div class="row">
                    <div class="col">
                        <label for="selectUsuario" class="form-label">Usuario:</label>
                        <select name="usuario" id="selectUsuario" class="form-select" onchange="validarCampo(this)">
                            <option value="" selected>Seleccione un usuario</option>
                        </select>
                    </div>
                </div>
                <br>

                <p class="h5">Datos de la Canción</p>
                <hr>
                <div class="row">
                    <div class="col">
                        <label for="inputTitulo" class="form-label">Título:</label>
                        <input type="text" name="titulo" id="inputTitulo" class="form-control"
                            onchange="validarCampo(this)">
                    </div>
                    <div class="col">
                        <label for="inputArtista" class="form-label">Artista:</label>
                        <input type="text" name="artista" id="inputArtista" class="form-control"
                            onchange="validarCampo(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputAlbum" class="form-label">Álbum:</label>
                        <input type="text" name="album" id="inputAlbum" class="form-control">
                    </div>
                    <div class="col">
                        <label for="inputGenero" class="form-label">Género musical:</label>
                        <input type="text" name="genero" id="inputGenero" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputDuracion" class="form-label">Duración (segundos):</label>
                        <input type="number" min="0" name="duracion" id="inputDuracion" class="form-control">
                    </div>
                    <div class="col">
                        <label for="inputAnio" class="form-label">Año:</label>
                        <input type="number" min="0" name="anio" id="inputAnio" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputIdioma" class="form-label">Idioma:</label>
                        <input type="text" name="idioma" id="inputIdioma" class="form-control">
                    </div>
                    <div class="col">
                        <label for="inputPlataforma" class="form-label">Plataforma:</label>
                        <input type="text" name="plataforma" id="inputPlataforma" class="form-control">
                    </div>
                    <div class="col d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" name="favorita" id="inputFavorita" class="form-check-input" checked>
                            <label for="inputFavorita" class="form-check-label">Marcar como favorita</label>
                        </div>
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" class="btn btn-secondary me-2" value="Cancelar">
                        <button type="button" class="btn btn-primary" value="Enviar"
                            onclick="validarFormularioCancion()">Enviar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
